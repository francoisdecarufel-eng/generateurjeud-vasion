          }
        ]
      }
    ];

    const THEMES = [
      "Monde fantastique / médiéval", "Exploration spatiale / futuriste", "Univers scientifique / laboratoire",
      "Vie quotidienne / réaliste", "Univers jeu / aventure", "Univers historique", "Univers artistique / créatif",
      "Univers marin / océanique", "Univers des super-héros", "Univers des pirates / chasse au trésor",
      "Univers de la magie scientifique / steampunk", "Univers culinaire / pâtisserie", 
      "Univers urbain / ville interactive", "Univers écologique / nature"
    ];

    const QUESTION_TYPES = [
      "Choix multiple", "Glisser et déposer", "Trier ou classer", "Associer / jumeler",
      "Remplir les cases manquantes", "Résolution de problèmes (texte + calcul)", "Séquence logique",
      "Puzzle interactif (ex : pièces à placer pour former un code)", "Mini-jeu interactif (calcul, mesure, fractions, nombres décimaux, etc.)"
    ];

    // --- COMPOSANT PRINCIPAL ---
    function App() {
      const [activeTab, setActiveTab] = useState(1);
      
      // États du formulaire : TOUT EST NULL / VIDE PAR DÉFAUT
      const [cycle, setCycle] = useState(null);
      const [year, setYear] = useState(null);
      const [selectedConcepts, setSelectedConcepts] = useState([]);
      const [selectedTheme, setSelectedTheme] = useState(null);
      const [customTheme, setCustomTheme] = useState('');
      const [selectedTypes, setSelectedTypes] = useState([]);
      
      // États pour l'onglet 5 (Chambres et Coffres)
      const [numRooms, setNumRooms] = useState(3);
      const [questionsPerRoom, setQuestionsPerRoom] = useState(3);
      const [requireSecretCode, setRequireSecretCode] = useState(false);

      // État du résultat
      const [generatedPrompt, setGeneratedPrompt] = useState(null);
      const [isCopied, setIsCopied] = useState(false);
      
      // État pour les alertes (Toast) et la confirmation de Reset
      const [toastMessage, setToastMessage] = useState(null);
      const [showConfirmReset, setShowConfirmReset] = useState(false);

      // --- FONCTION POUR AFFICHER LES ALERTES (Remplace window.alert) ---
      const showToast = (message) => {
        setToastMessage(message);
        setTimeout(() => setToastMessage(null), 4000);
      };

      // --- LOGIQUE DE RÉINITIALISATION (Remplace window.confirm) ---
      const executeReset = () => {
        setCycle(null);
        setYear(null);
        setSelectedConcepts([]);
        setSelectedTheme(null);
        setCustomTheme('');
        setSelectedTypes([]);
        setNumRooms(3);
        setQuestionsPerRoom(3);
        setRequireSecretCode(false);
        setGeneratedPrompt(null);
        setActiveTab(1);
        setShowConfirmReset(false);
      };

      // --- LOGIQUE D'AFFICHAGE DES CONCEPTS ---
      const getConceptStyleAndVisibility = (item) => {
        // Si aucun cycle n'est sélectionné, on affiche tout de façon neutre
        if (!cycle) {
          return { isVisible: true, isFaded: false, textStyle: "text-gray-700" };
        }

        const isC1 = item.cycles.includes(1);
        const isC2 = item.cycles.includes(2);
        const isC3 = item.cycles.includes(3);

        let isVisible = false;
        let isFaded = false;
        let textStyle = "text-gray-700";

        if (cycle === 1) {
          if (isC1) {
            isVisible = true;
            if (year === 1) textStyle = item.c1y === 1 ? "text-blue-600 font-medium" : "font-bold text-gray-900";
            if (year === 2) textStyle = item.c1y === 2 ? "text-blue-600 font-medium" : "font-bold text-gray-900";
          }
        } else if (cycle === 2) {
          if (isC2) {
            isVisible = true;
            if (year === 3) textStyle = item.c2y === 3 ? "text-blue-600 font-medium" : "font-bold text-gray-900";
            if (year === 4) textStyle = item.c2y === 4 ? "text-blue-600 font-medium" : "font-bold text-gray-900";
          } else if (isC1) {
            isVisible = true;
            isFaded = true;
          }
        } else if (cycle === 3) {
          if (isC3) {
            isVisible = true;
            if (year === 5) textStyle = item.c3y === 5 ? "text-blue-600 font-medium" : "font-bold text-gray-900";
            if (year === 6) textStyle = item.c3y === 6 ? "text-blue-600 font-medium" : "font-bold text-gray-900";
          } else if (isC1 || isC2) {
            isVisible = true;
            isFaded = true;
          }
        }

        return { isVisible, isFaded, textStyle };
      };

      const handleConceptToggle = (text) => {
        setSelectedConcepts(prev => 
          prev.includes(text) ? prev.filter(c => c !== text) : [...prev, text]
        );
      };

      const handleTypeToggle = (type) => {
        setSelectedTypes(prev => 
          prev.includes(type) ? prev.filter(t => t !== type) : [...prev, type]
        );
      };

      // --- GÉNÉRATION DU PROMPT ---
      const handleGeneratePrompt = () => {
        if (!cycle || !year) {
          showToast("Veuillez sélectionner un niveau scolaire (Onglet 1) avant de générer.");
          setActiveTab(1);
          return;
        }
        if (selectedConcepts.length === 0) {
          showToast("Veuillez sélectionner au moins un concept mathématique (Onglet 2) avant de générer.");
          setActiveTab(2);
          return;
        }
        if (!selectedTheme && !customTheme) {
          showToast("Veuillez sélectionner un thème (Onglet 3) avant de générer.");
          setActiveTab(3);
          return;
        }
        if (selectedTypes.length === 0) {
          showToast("Veuillez sélectionner au moins un type de défi (Onglet 4) avant de générer.");
          setActiveTab(4);
          return;
        }

        const finalTheme = customTheme ? customTheme : selectedTheme;
        const totalQuestions = parseInt(numRooms) * parseInt(questionsPerRoom);

        // --- DÉBUT DU PROMPT GÉNÉRÉ OPTIMISÉ ---
        const promptStr = `Rôle de l'IA :
Tu es un concepteur d’outils pédagogiques numériques spécialisés en mathématiques au primaire (Québec). Mission : créer le code (HTML/CSS/JS) et le scénario complet d'un jeu d’évasion interactif.

⚠️ MÉTA-CONSIGNE STRICTE : Agis comme un concepteur professionnel de niveau maison d'édition. Rigueur mathématique et qualité pédagogique absolues requises. Ne fournis pas de blabla, génère directement le code jouable final en un seul fichier structuré.

1. PUBLIC CIBLE : Cycle ${cycle} (${year}e année)

2. CONCEPTS MATHÉMATIQUES :
${selectedConcepts.map(c => `- ${c}`).join('\n')}

3. THÈME ET UNIVERS : **${finalTheme}**
⚠️ EXIGENCE VISUELLE ABSOLUE : Le rendu doit être de qualité professionnelle, style dessin animé (Pixar/Ghibli). Chaque pièce doit foisonner de détails visuels spécifiques au thème (textures, lumières, objets d'ambiance riches, décors complexes). Ne génère aucun décor vide ; l'immersion doit être totale et magnifique.

4. TYPES DE DÉFIS :
${selectedTypes.map(t => `- ${t}`).join('\n')}

5. STRUCTURE ET MÉCANIQUE :
- ${numRooms} chambres (pièces). Objectif global : trouver 1 clé par chambre (total: ${numRooms} clés).
- ${questionsPerRoom} énigmes par chambre (Total jeu : ${totalQuestions} énigmes).
${requireSecretCode ? `- MÉCANIQUE DU COFFRE : Dans chaque pièce, la clé est dans un coffre. Les ${questionsPerRoom} énigmes donnent un CODE SECRET. Les élèves doivent saisir ce code pour ouvrir le coffre, obtenir la clé, et débloquer la porte vers la suite. ⚠️ CONSIGNE STRICTE : Les chiffres du code obtenus après chaque énigme doivent impérativement apparaître et rester affichés en référence à l'écran pour les élèves. De plus, il faut OBLIGATOIREMENT qu'un indice clair indique la position de chaque chiffre dans le code final (ex: "Voici le 1er chiffre", ou un HUD affichant "Code : 4 _ _") afin que l'élève connaisse l'ordre exact.` : '- Les énigmes résolues déverrouillent la clé pour passer à la pièce suivante.'}

6. RÉTROACTIONS : Animations et feedbacks immédiats pour chaque action (réussite/erreur).

7. TRANSITIONS ET PORTES ANIMÉES (CONSIGNE STRICTE DE DÉVELOPPEMENT) :
Afin de garantir un standard visuel "dessin animé", tu dois OBLIGATOIREMENT intégrer une PORTE MAGIQUE ANIMÉE (utilise des URLs d'images GIF ou des animations CSS/SVG d'une beauté exceptionnelle) pour chaque transition, et une GRANDE PORTE SPECTACULAIRE pour la victoire.

Cahier des charges visuel :
- FOISONNEMENT THÉMATIQUE : Le design de la porte et de chaque pièce doit déborder d'éléments liés à l'univers [${finalTheme}].
- ANIMATION DE PORTE : Les portes doivent s'ouvrir de façon fluide et impressionnante visuellement (incorporation de GIF ou CSS 3D complexe avec particules).
- INTERACTION : La porte de transition devient cliquable/ouvrable après avoir obtenu la clé de la pièce. La grande porte finale de victoire ne s'ouvre que lorsque les ${numRooms} clés sont rassemblées.

8. ARCHITECTURE CSS ET STRUCTURATION SPATIALE (CONSIGNE STRICTE) :
Implémente une architecture de mise en page avancée (CSS Grid / Flexbox) pour chaque pièce du jeu. Les éléments interactifs, les énigmes, le coffre et les objets de décor doivent être parfaitement organisés, structurés et dispersés de manière logique pour exploiter l'entièreté de l'espace disponible (viewport) de manière harmonieuse et responsive. Évite tout encombrement superposé et assure une hiérarchie visuelle claire de l'espace.

9. ASSURANCE QUALITÉ ET JOUABILITÉ SANS BUG (CONSIGNE STRICTE) :
Le code généré doit être structurellement parfait et "production-ready". Tu dois impérativement garantir une gestion d'état (state management) infaillible : toutes les validations d'énigmes mathématiques, la collecte des clés, les codes de coffres et les transitions entre les pièces doivent s'enchaîner de manière fluide. La chronologie du jeu doit mener le joueur à la victoire finale sans aucun bug bloquant, sans erreur de console, sans impasse logique ni problème de configuration. Le jeu doit être 100% fonctionnel et testé logiquement pour être jouable du début à la fin dès le premier rendu.

10. REPRÉSENTATIONS VISUELLES MATHÉMATIQUES (CONSIGNE STRICTE) :
Pour tout concept nécessitant un support graphique (polygones, solides géométriques, fractions en tarte/pizza, diagrammes à bandes, pictogrammes, plan cartésien, droite numérique, etc.), tu dois IMPÉRATIVEMENT générer des représentations visuelles parfaites et proportionnelles. Utilise du code SVG (Scalable Vector Graphics) natif intégré directement dans le HTML, ou des constructions CSS précises. Les représentations doivent être visuellement exactes, esthétiques et soutenir la compréhension mathématique sans ambiguïté. Aucune description textuelle de forme n'est acceptée en remplacement du visuel. L'élève doit voir et interagir avec des graphiques réels.

Veuillez maintenant générer le document complet et jouable structurant ce jeu d'évasion.`;

        setGeneratedPrompt(promptStr);
      };

      const handleCopy = () => {
        try {
          const el = document.createElement('textarea');
          el.value = generatedPrompt;
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          setIsCopied(true);
          setTimeout(() => setIsCopied(false), 2500);
        } catch (err) {
          console.error('Failed to copy text: ', err);
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans p-4 md:p-8 relative">
          
          {/* TOAST NOTIFICATION (Remplace window.alert) */}
          {toastMessage && (
            <div className="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 bg-red-600 text-white px-6 py-3 rounded-xl shadow-2xl font-bold flex items-center animate-fade-in border border-red-400">
              <AlertCircle size={20} className="mr-3" />
              {toastMessage}
            </div>
          )}

          <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
            
            {/* MENU LATÉRAL */}
            <div className="w-full md:w-1/4 bg-slate-900 text-white p-6 flex flex-col">
              <h1 className="text-2xl font-bold mb-8 flex items-center text-indigo-400 leading-tight">
                <FileText className="mr-2 flex-shrink-0" /> Générateur de Requête
              </h1>
              <nav className="space-y-2 flex-grow">
                {[
                  { id: 1, label: "Niveau Scolaire", icon: <Layers size={18} /> },
                  { id: 2, label: "Concepts", icon: <BookOpen size={18} /> },
                  { id: 3, label: "Thèmes & Univers", icon: <ImageIcon size={18} /> },
                  { id: 4, label: "Types de Défis", icon: <HelpCircle size={18} /> },
                  { id: 5, label: "Structure du Jeu", icon: <Settings size={18} /> },
                ].map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`w-full flex items-center p-3 rounded-lg text-left transition-colors ${
                      activeTab === tab.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800'
                    }`}
                  >
                    <span className="mr-3">{tab.icon}</span>
                    <span className="font-medium text-sm">{tab.label}</span>
                  </button>
                ))}
              </nav>
              
              <div className="mt-8 pt-6 border-t border-slate-700">
                 {/* BOUTON RESET CORRIGÉ (Remplace window.confirm) */}
                 {showConfirmReset ? (
                   <div className="bg-slate-800 p-4 rounded-xl border border-red-500/50 animate-fade-in">
                     <p className="text-sm text-slate-300 mb-3 text-center font-medium">Tout effacer ?</p>
                     <div className="flex space-x-3">
                       <button onClick={executeReset} className="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg text-sm font-bold transition-colors shadow-sm">Oui</button>
                       <button onClick={() => setShowConfirmReset(false)} className="flex-1 bg-slate-600 hover:bg-slate-500 text-white py-2 rounded-lg text-sm font-bold transition-colors shadow-sm">Non</button>
                     </div>
                   </div>
                 ) : (
                   <button 
                      onClick={() => setShowConfirmReset(true)}
                      className="w-full flex items-center justify-center p-3 text-red-400 hover:bg-red-500 hover:text-white rounded-lg transition-colors font-medium text-sm"
                    >
                      <Trash2 size={16} className="mr-2" /> Effacer tous les choix
                    </button>
                 )}
              </div>
            </div>

            {/* CONTENU PRINCIPAL */}
            <div className="w-full md:w-3/4 bg-white h-[85vh] flex flex-col">
              
              <div className="p-8 flex-grow overflow-y-auto relative">
                
                {/* ONGLET 1 : Niveau Scolaire */}
                {activeTab === 1 && (
                  <div className="animate-fade-in pb-20">
                    <h2 className="text-3xl font-bold text-slate-800 border-b pb-4 mb-6">Niveau scolaire visé</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      {[
                        { cyc: 1, y1: 1, y2: 2, label: "Cycle 1" },
                        { cyc: 2, y1: 3, y2: 4, label: "Cycle 2" },
                        { cyc: 3, y1: 5, y2: 6, label: "Cycle 3" }
                      ].map(c => (
                        <div key={c.cyc} className={`border-2 rounded-xl p-6 cursor-pointer transition-all ${cycle === c.cyc ? 'border-indigo-500 bg-indigo-50 shadow-md' : 'border-gray-200 hover:border-indigo-300'}`}>
                          <h3 className="text-xl font-bold mb-4 text-center text-slate-700">{c.label}</h3>
                          <div className="space-y-3">
                            <button onClick={() => { setCycle(c.cyc); setYear(c.y1); }} className={`w-full py-2 px-4 rounded-md font-medium transition-colors ${year === c.y1 ? 'bg-indigo-600 text-white shadow' : 'bg-white border hover:bg-gray-50'}`}>
                              {c.y1}e année
                            </button>
                            <button onClick={() => { setCycle(c.cyc); setYear(c.y2); }} className={`w-full py-2 px-4 rounded-md font-medium transition-colors ${year === c.y2 ? 'bg-indigo-600 text-white shadow' : 'bg-white border hover:bg-gray-50'}`}>
                              {c.y2}e année
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* ONGLET 2 : Concepts */}
                {activeTab === 2 && (
                  <div className="animate-fade-in pb-20">
                    <div className="flex justify-between items-center border-b pb-4 mb-6 sticky top-0 bg-white z-10">
                      <h2 className="text-3xl font-bold text-slate-800">Concepts à intégrer</h2>
                      <div className="bg-slate-100 p-2 rounded-lg text-sm flex flex-wrap gap-4 border border-slate-200 shadow-sm">
                        <span className="text-blue-600 font-medium">Bleu = {year ? `${year}e année` : "Année ciblée"}</span>
                        <span className="font-bold text-gray-900">Gras = Autre année du cycle {cycle || "?"}</span>
                        {cycle && cycle > 1 && <span className="opacity-50 text-gray-500 italic">Pâle = Cycles inférieurs</span>}
                      </div>
                    </div>

                    {!cycle && (
                      <div className="bg-amber-50 border-l-4 border-amber-500 p-4 mb-6 rounded-r-lg">
                        <p className="text-amber-800 text-sm">Veuillez d'abord sélectionner un niveau scolaire à l'<strong>Étape 1</strong> pour voir les concepts mis en évidence pour votre année.</p>
                      </div>
                    )}
                    
                    <div className="space-y-8">
                      {CONCEPTS.map((cat, i) => (
                        <div key={i} className="bg-slate-50 rounded-xl p-6 border border-slate-200">
                          <h3 className="text-2xl font-bold text-indigo-900 mb-6 pb-2 border-b-2 border-indigo-200">{cat.category}</h3>
                          {cat.subcategories.map((sub, j) => (
                            <div key={j} className="mb-6 last:mb-0">
                              <h4 className="text-lg font-bold text-slate-700 mb-3 ml-2">{sub.title}</h4>
                              <div className="space-y-2 ml-4">
                                {sub.items.map((item, k) => {
                                  const { isVisible, isFaded, textStyle } = getConceptStyleAndVisibility(item);
                                  if (!isVisible) return null;
                                  
                                  return (
                                    <label key={k} className={`flex items-start p-2 rounded-lg hover:bg-white transition-colors cursor-pointer ${isFaded ? 'opacity-50 hover:opacity-100' : ''}`}>
                                      <input 
                                        type="checkbox" 
                                        className="mt-1 w-5 h-5 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500"
                                        checked={selectedConcepts.includes(item.text)}
                                        onChange={() => handleConceptToggle(item.text)}
                                      />
                                      <span className={`ml-3 ${textStyle} text-sm leading-snug`}>
                                        {item.text}
                                      </span>
                                    </label>
                                  );
                                })}
                              </div>
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* ONGLET 3 : Thèmes */}
                {activeTab === 3 && (
                  <div className="animate-fade-in pb-20">
                    <h2 className="text-3xl font-bold text-slate-800 border-b pb-4 mb-6">Thèmes et Univers</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {THEMES.map((t, i) => (
                        <label key={i} className={`flex items-center p-4 border rounded-xl cursor-pointer transition-all ${selectedTheme === t && !customTheme ? 'bg-indigo-50 border-indigo-500 shadow-md ring-2 ring-indigo-200' : 'bg-white hover:border-indigo-300'}`}>
                          <input 
                            type="radio" 
                            name="theme" 
                            className="w-5 h-5 text-indigo-600 focus:ring-indigo-500"
                            checked={selectedTheme === t && !customTheme}
                            onChange={() => { setSelectedTheme(t); setCustomTheme(''); }}
                          />
                          <span className="ml-3 font-medium text-slate-700">{t}</span>
                        </label>
                      ))}
                      <label className={`flex flex-col p-4 border rounded-xl cursor-pointer transition-all ${customTheme ? 'bg-indigo-50 border-indigo-500 shadow-md ring-2 ring-indigo-200' : 'bg-white hover:border-indigo-300'}`}>
                        <div className="flex items-center mb-2">
                          <input 
                            type="radio" 
                            name="theme" 
                            className="w-5 h-5 text-indigo-600 focus:ring-indigo-500"
                            checked={!!customTheme}
                            onChange={() => document.getElementById('customThemeInput').focus()}
                          />
                          <span className="ml-3 font-medium text-slate-700">Autre univers personnalisé :</span>
                        </div>
                        <input 
                          id="customThemeInput"
                          type="text" 
                          placeholder="Ex: Le monde des dinosaures..."
                          className="ml-8 p-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none"
                          value={customTheme}
                          onChange={(e) => setCustomTheme(e.target.value)}
                        />
                      </label>
                    </div>
                  </div>
                )}

                {/* ONGLET 4 : Types de défis */}
                {activeTab === 4 && (
                  <div className="animate-fade-in pb-20">
                    <h2 className="text-3xl font-bold text-slate-800 border-b pb-4 mb-6">Types de défis mathématiques à introduire</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {QUESTION_TYPES.map((type, i) => (
                        <label key={i} className={`flex items-center p-4 border rounded-xl cursor-pointer transition-all ${selectedTypes.includes(type) ? 'bg-indigo-50 border-indigo-500 shadow-sm' : 'bg-white hover:bg-gray-50'}`}>
                          <input 
                            type="checkbox" 
                            className="w-5 h-5 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500"
                            checked={selectedTypes.includes(type)}
                            onChange={() => handleTypeToggle(type)}
                          />
                          <span className="ml-3 text-slate-700 font-medium">{type}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                )}

                {/* ONGLET 5 : Paramètres finaux (Structure du Jeu) */}
                {activeTab === 5 && !generatedPrompt && (
                  <div className="animate-fade-in pb-20">
                    <h2 className="text-3xl font-bold text-slate-800 border-b pb-4 mb-6">Structure du Jeu & Énigmes</h2>
                    
                    <div className="space-y-6 max-w-2xl mb-8">
                      
                      {/* Nombre de chambres */}
                      <div className="bg-white p-6 border rounded-xl shadow-sm flex items-start">
                        <div className="bg-indigo-100 p-3 rounded-full mr-4">
                          <DoorOpen className="text-indigo-600" size={24} />
                        </div>
                        <div className="flex-grow">
                          <label className="block text-lg font-bold text-slate-800 mb-1">Nombre de chambres (pièces)</label>
                          <p className="text-sm text-slate-500 mb-3">Cela correspond au nombre de clés que les élèves devront trouver pour débarrer la porte finale.</p>
                          <div className="flex items-center">
                            <input 
                              type="range" 
                              min="1" max="10" 
                              className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                              value={numRooms}
                              onChange={(e) => setNumRooms(e.target.value)}
                            />
                            <span className="ml-4 font-bold text-xl text-indigo-700 w-8 text-center">{numRooms}</span>
                          </div>
                        </div>
                      </div>

                      {/* Questions par chambre */}
                      <div className="bg-white p-6 border rounded-xl shadow-sm flex items-start">
                        <div className="bg-teal-100 p-3 rounded-full mr-4">
                          <HelpCircle className="text-teal-600" size={24} />
                        </div>
                        <div className="flex-grow">
                          <label className="block text-lg font-bold text-slate-800 mb-1">Énigmes par chambre</label>
                          <p className="text-sm text-slate-500 mb-3">Nombre de questions à résoudre dans chaque pièce pour avoir accès à la clé.</p>
                          <div className="flex items-center">
                            <input 
                              type="range" 
                              min="1" max="10" 
                              className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-teal-600"
                              value={questionsPerRoom}
                              onChange={(e) => setQuestionsPerRoom(e.target.value)}
                            />
                            <span className="ml-4 font-bold text-xl text-teal-700 w-8 text-center">{questionsPerRoom}</span>
                          </div>
                          <div className="mt-3 pt-3 border-t text-sm font-medium text-slate-600">
                            Total pour le jeu : <span className="font-bold text-slate-900">{numRooms * questionsPerRoom}</span> énigmes.
                          </div>
                        </div>
                      </div>

                      {/* Mécanique du code secret */}
                      <div className={`p-6 border-2 rounded-xl shadow-sm transition-colors cursor-pointer ${requireSecretCode ? 'bg-amber-50 border-amber-400' : 'bg-white border-gray-200 hover:border-amber-200'}`}
                           onClick={() => setRequireSecretCode(!requireSecretCode)}>
                        <div className="flex items-start">
                          <div className={`p-3 rounded-full mr-4 transition-colors ${requireSecretCode ? 'bg-amber-200 text-amber-800' : 'bg-gray-100 text-gray-400'}`}>
                            <Lock size={24} />
                          </div>
                          <div className="flex-grow">
                            <div className="flex justify-between items-center mb-1">
                              <label className="text-lg font-bold text-slate-800 cursor-pointer">Mécanique du coffre et code secret</label>
                              <input 
                                type="checkbox" 
                                className="w-5 h-5 text-amber-500 rounded border-gray-300 focus:ring-amber-500 cursor-pointer"
                                checked={requireSecretCode}
                                onChange={() => setRequireSecretCode(!requireSecretCode)}
                              />
                            </div>
                            <p className={`text-sm ${requireSecretCode ? 'text-amber-800' : 'text-slate-500'}`}>
                              Dans chaque pièce, la clé est enfermée dans un coffre. Les réponses aux {questionsPerRoom} énigmes de la pièce permettent de découvrir un <strong>code secret</strong> que les élèves devront saisir pour ouvrir le coffre et obtenir la clé.
                            </p>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Rappel de la consigne stricte */}
                    <div className="bg-indigo-50 border-l-4 border-indigo-500 p-5 rounded-r-xl max-w-2xl">
                      <h4 className="font-bold text-indigo-900 mb-1 flex items-center text-sm">
                        <AlertCircle size={16} className="mr-2" /> Consigne stricte à l'IA incluse
                      </h4>
                      <p className="text-xs text-indigo-800 leading-relaxed italic">
                        "Tu dois agir comme un concepteur professionnel... L'exigence de qualité pédagogique et de rigueur mathématique est absolue."
                      </p>
                    </div>
                  </div>
                )}

                {/* RÉSULTAT : PROMPT GÉNÉRÉ */}
                {activeTab === 5 && generatedPrompt && (
                  <div className="animate-fade-in pb-20">
                    <div className="flex justify-between items-center border-b pb-4 mb-6">
                      <h2 className="text-3xl font-bold text-emerald-700 flex items-center">
                        <Sparkles className="mr-3" /> Requête générée avec succès !
                      </h2>
                      <button 
                        onClick={handleCopy}
                        className={`flex items-center px-4 py-2 rounded-lg font-bold text-white transition-all shadow-md ${isCopied ? 'bg-green-500' : 'bg-indigo-600 hover:bg-indigo-700'}`}
                      >
                        {isCopied ? <><CheckCircle size={18} className="mr-2"/> Copié !</> : <><Copy size={18} className="mr-2"/> Copier la requête</>}
                      </button>
                    </div>
                    
                    <div className="bg-slate-900 rounded-xl p-6 shadow-inner border border-slate-700">
                      <p className="text-slate-400 text-sm mb-4">
                        Copiez le texte ci-dessous et collez-le dans ChatGPT, Claude ou Gemini pour générer le contenu du jeu.
                      </p>
                      <textarea 
                        readOnly
                        value={generatedPrompt}
                        className="w-full h-96 bg-slate-800 text-slate-100 p-4 rounded-lg border border-slate-600 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"
                      />
                    </div>
                    
                    <div className="mt-6 flex justify-center">
                      <button 
                        onClick={() => setGeneratedPrompt(null)}
                        className="text-indigo-600 hover:text-indigo-800 font-medium underline"
                      >
                        Modifier la structure et regénérer
                      </button>
                    </div>
                  </div>
                )}
                
              </div>

              {/* NAVIGATION FOOTER */}
              <div className="bg-gray-50 border-t p-4 flex justify-between items-center">
                <div>
                  {activeTab > 1 && (
                    <button 
                      onClick={() => { setActiveTab(prev => prev - 1); setGeneratedPrompt(null); }}
                      className="flex items-center px-6 py-3 text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-100 transition-colors font-medium"
                    >
                      <ChevronLeft size={20} className="mr-1" /> Précédent
                    </button>
                  )}
                </div>

                <div>
                  {activeTab < 5 ? (
                    <button 
                      onClick={() => setActiveTab(prev => prev + 1)}
                      className="flex items-center px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors shadow-md font-bold"
                    >
                      Suivant <ChevronRight size={20} className="ml-1" />
                    </button>
                  ) : (
                    !generatedPrompt && (
                      <button 
                        onClick={handleGeneratePrompt}
                        className="flex items-center px-8 py-3 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-lg hover:from-emerald-600 hover:to-teal-700 transition-transform transform hover:scale-105 shadow-lg font-bold text-lg"
                      >
                        <FileText size={20} className="mr-2" /> Générer la requête
                      </button>
                    )
                  )}
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // Affichage de l'application dans le DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
